<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightsMojo</title>
    
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <script>
        // Configuration
        const URLS = {
            ios: 'https://apps.apple.com/app/id310633997',
            android: 'https://play.google.com/store/apps/details?id=com.whatsapp',
            desktop: 'https://flightsmojo.com'
        };

        window.dataLayer = window.dataLayer || [];

        // Detect & Redirect
        (function() {
            const ua = navigator.userAgent;
            const platform = /iPad|iPhone|iPod/.test(ua) && !window.MSStream ? 'ios' :
                           /android/i.test(ua) ? 'android' : 'desktop';
            
            const referrer = document.referrer.toLowerCase();
            const source = referrer.includes('whatsapp') ? 'whatsapp' :
                          referrer.includes('instagram') ? 'instagram' :
                          referrer.includes('facebook') ? 'facebook' :
                          referrer ? 'other' : 'direct';
            
            // Track
            window.dataLayer.push({
                event: 'auto_redirect',
                platform: platform,
                source: source,
                url: URLS[platform]
            });
            
            // Redirect
            window.location.replace(URLS[platform]);
        })();
    </script>
</body>
</html>
